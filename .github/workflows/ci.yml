name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  quality:
    name: Lint & Test
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PowerShell modules
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module Pester -MinimumVersion 5.5.0 -Force -SkipPublisherCheck -Scope CurrentUser
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser

      - name: PSScriptAnalyzer
        run: |
          $results = Invoke-ScriptAnalyzer -Path . -Recurse -Settings ./PSScriptAnalyzerSettings.psd1
          if ($results) { $results | Format-Table -AutoSize | Out-String | Write-Host }
          $errors = @($results | Where-Object { $_.Severity -eq 'Error' })
          Write-Host "Analyzer findings: $($results.Count) total, $($errors.Count) error(s)."
          if ($errors.Count -gt 0) {
            throw "PSScriptAnalyzer reported $($errors.Count) error-severity finding(s)."
          }

      - name: Pester tests
        run: ./Tests/PesterConfiguration.ps1

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            testResults.xml
            coverage.xml
          if-no-files-found: ignore
